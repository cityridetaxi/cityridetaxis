name: Deploy CityRide

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: cityride

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Copy Code To Deployment Folder
        run: |
          rsync -av --delete \
          --exclude=node_modules \
          --exclude=.git \
          $GITHUB_WORKSPACE/ \
          /home/ubuntu/cityridetaxis/

      - name: Install Production Packages
        run: |
          cd /home/ubuntu/cityridetaxis
          npm install

      - name: Restart Application
        run: |
          pm2 restart cityride || pm2 start server.js --name cityride
          pm2 save



