name: Deploy CityRide

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: |
          rsync -av --delete \
          --exclude=node_modules \
          --exclude=.git \
          $GITHUB_WORKSPACE/ \
          /home/ubuntu/cityridetaxis/

      - run: |
          cd /home/ubuntu/cityridetaxis
          npm install

      - run: |
          pm2 restart cityride || pm2 start server.js --name cityride
          pm2 save
